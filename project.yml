name: Remux
options:
  bundleIdPrefix: dev.remux
  deploymentTarget:
    iOS: "18.0"
  postGenCommand: >-
    /usr/bin/perl -0pi -e 's/lastKnownFileType = wrapper\.icon;/lastKnownFileType = folder.iconcomposer.icon;/g' Remux.xcodeproj/project.pbxproj
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: dev.remux.app
    PRODUCT_NAME: Remux
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    TARGETED_DEVICE_FAMILY: 1
    SUPPORTS_MACCATALYST: NO
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64
    OTHER_LDFLAGS:
      - -lc++
packages:
  Citadel:
    url: https://github.com/h3nock/Citadel.git
    revision: c3d5fa0d901d3fbdfeb48f009ab529f887deab81
targets:
  Remux:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RemuxApp/Sources
      - path: RemuxApp/Assets.xcassets
      - path: RemuxApp/Remux.icon
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: Remux
    dependencies:
      - framework: ../ghostty-remux-option-c/macos/GhosttyKit.xcframework
        embed: false
      - package: Citadel
    info:
      path: RemuxApp/Info.plist
      properties:
        CFBundleDisplayName: Remux
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
  RemuxTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RemuxAppTests
    dependencies:
      - target: Remux
      - framework: ../ghostty-remux-option-c/macos/GhosttyKit.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.remux.appTests
        PRODUCT_NAME: RemuxTests
        PRODUCT_MODULE_NAME: RemuxTests
        GENERATE_INFOPLIST_FILE: YES
  RemuxUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RemuxAppUITests
    dependencies:
      - target: Remux
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.remux.appUITests
        PRODUCT_NAME: RemuxUITests
        PRODUCT_MODULE_NAME: RemuxUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Remux:
    build:
      targets:
        Remux: all
        RemuxTests: [test]
        RemuxUITests: [test]
    test:
      targets:
        - RemuxTests
        - RemuxUITests
